<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird Deluxe+</title>
<style>
  body {
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background: linear-gradient(#70c5ce, #ffffff);
  }

  canvas {
    display:block;
    margin:0 auto;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
  }

  #ui {
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:28px;
    font-weight:bold;
    text-shadow:2px 2px 6px rgba(0,0,0,0.5);
  }

  #startScreen {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:rgba(0,0,0,0.4);
    color:white;
  }

  button {
    padding:12px 24px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ffcc00;
  }
</style>
</head>
<body>

<div id="ui">Score: 0</div>

<div id="startScreen">
  <h1>🐦 Flappy Bird Deluxe+</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const startScreen = document.getElementById('startScreen');

let bird, pipes, score, gameOver;

function init(){
  bird = { x:80, y:200, w:30, h:30, dy:0 };
  pipes = [];
  score = 0;
  gameOver = false;
}

let gravity = 0.5;
let lift = -8;

function spawnPipe(){
  let gap = 130;
  let top = Math.random()*250 + 50;
  pipes.push({ x:400, top:top, bottom:top+gap, passed:false });
}

let pipeInterval;

function startGame(){
  startScreen.style.display = 'none';
  init();
  pipeInterval = setInterval(spawnPipe, 1500);
  loop();
}

function update(){
  if(gameOver) return;

  bird.dy += gravity;
  bird.y += bird.dy;

  if(bird.y > canvas.height || bird.y < 0){
    endGame();
  }

  pipes.forEach((p)=>{
    p.x -= 2.5;

    if(bird.x < p.x+60 && bird.x+bird.w > p.x &&
       (bird.y < p.top || bird.y+bird.h > p.bottom)){
      endGame();
    }

    if(p.x+60 < bird.x && !p.passed){
      score++;
      p.passed = true;
    }
  });

  ui.innerText = 'Score: '+score;
}

function drawBird(){
  // body
  ctx.fillStyle = '#FFD93D';
  ctx.beginPath();
  ctx.arc(bird.x+15, bird.y+15, 15, 0, Math.PI*2);
  ctx.fill();

  // wing
  ctx.fillStyle = '#FFC300';
  ctx.beginPath();
  ctx.ellipse(bird.x+10, bird.y+18, 8, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // eye
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(bird.x+20, bird.y+12, 5, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = 'black';
  ctx.beginPath();
  ctx.arc(bird.x+22, bird.y+12, 2, 0, Math.PI*2);
  ctx.fill();

  // beak
  ctx.fillStyle = 'orange';
  ctx.beginPath();
  ctx.moveTo(bird.x+28, bird.y+15);
  ctx.lineTo(bird.x+38, bird.y+18);
  ctx.lineTo(bird.x+28, bird.y+20);
  ctx.fill();
}

function drawPipes(){
  pipes.forEach(p=>{
    let gradient = ctx.createLinearGradient(p.x,0,p.x+60,0);
    gradient.addColorStop(0,'#2ecc71');
    gradient.addColorStop(1,'#27ae60');

    ctx.fillStyle = gradient;

    // top pipe
    ctx.fillRect(p.x,0,60,p.top);

    // bottom pipe
    ctx.fillRect(p.x,p.bottom,60,canvas.height);

    // pipe cap
    ctx.fillStyle = '#1e8449';
    ctx.fillRect(p.x-5,p.top-10,70,10);
    ctx.fillRect(p.x-5,p.bottom,70,10);
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBird();
  drawPipes();
}

function loop(){
  update();
  draw();
  if(!gameOver) requestAnimationFrame(loop);
}

function endGame(){
  gameOver = true;
  clearInterval(pipeInterval);
  setTimeout(()=>{
    startScreen.style.display='flex';
    startScreen.innerHTML = `<h1>Game Over</h1><p>Score: ${score}</p><button onclick="startGame()">Restart</button>`;
  },200);
}

document.addEventListener('keydown', e=>{
  if(e.code==='Space') bird.dy = lift;
});

document.addEventListener('click', ()=> bird.dy = lift);

init();
</script>

</body>
</html>
