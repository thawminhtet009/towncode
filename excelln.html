<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Formula Learning</title>
  <style>
    body { font-family: Arial; margin: 0; background: linear-gradient(135deg, #74ebd5, #9face6); min-height: 100vh; }
    .main-body { background: #f4f4f4; }

    header { background: #2d89ef; color: white; padding: 10px 20px; display: none; }
    .nav { display: flex; justify-content: space-between; align-items: center; }
    .menu a { color: white; margin-left: 15px; text-decoration: none; font-weight: bold; }

    .container { padding: 20px; display: none; max-width: 900px; margin: auto; }
    .card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    .media iframe { width: 100%; height: 315px; border-radius: 10px; margin-top: 10px; }

    .login-box {
      width: 90%; max-width: 350px; margin: 100px auto;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(15px);
      padding: 25px; border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-align: center; color: white;
    }

    .form-group { width: 100%; text-align: left; }
    .form-group input {
      width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 15px;
      border-radius: 8px; border: none; outline: none; font-size: 16px;
      box-sizing: border-box;
    }

    .otp-inputs { display: flex; justify-content: center; }
    .otp-inputs input {
      width: 45px; height: 50px; margin: 5px; font-size: 20px;
      text-align: center; border-radius: 8px; border: none;
    }

    button {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #2d89ef, #6a11cb);
      color: white; border: none; border-radius: 8px;
      font-size: 16px; cursor: pointer;
    }
  </style>
</head>
<body id="body">

<div class="login-box" id="loginBox">
  <h2 id="title">Login</h2>

  <div id="loginSection">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password">
    </div>

    <button onclick="login()">Login</button>
  </div>

  <div id="otpSection" style="display:none;">
    <p id="otpDisplay"></p>

    <div class="otp-inputs">
      <input maxlength="1" oninput="moveNext(this,0)" onkeydown="handleBack(event,0)">
      <input maxlength="1" oninput="moveNext(this,1)" onkeydown="handleBack(event,1)">
      <input maxlength="1" oninput="moveNext(this,2)" onkeydown="handleBack(event,2)">
      <input maxlength="1" oninput="moveNext(this,3)" onkeydown="handleBack(event,3)">
      <input maxlength="1" oninput="moveNext(this,4)" onkeydown="handleBack(event,4)">
      <input maxlength="1" oninput="moveNext(this,5)" onkeydown="handleBack(event,5)">
    </div>

    <button onclick="verifyOTP()">Verify OTP</button>
    <p id="timer"></p>
  </div>

  <p id="error" style="color:#ffdddd;"></p>
</div>

<header id="mainHeader">
  <div class="nav">
    <h1>📊 Excel Learning</h1>
    <div class="menu">
      <a href="#">Home</a>
    </div>
  </div>
</header>

<div class="container" id="mainContent">
  <div class="card">
    <h2>SUM</h2>
    <p>=SUM(A1:A10)</p>

    <div class="media">
      <h4>🎥 Video Lesson</h4>
      <iframe src="https://www.youtube.com/embed/ObSgFxqKlTc" allowfullscreen></iframe>
    </div>
  </div>
  <div class="card">
    <h2>Vlookup</h2>
    <p>=VLOOKUP(@U:U,L:M,2,0)</p>

    <div class="media">
      <h4>🎥 Video Lesson</h4>
      <iframe src="https://www.youtube.com/embed/inEJLqOI4F4" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script>
let generatedOTP = "";
let otpExpiryTime = 0;
let timerInterval;
let logoutTimer;

const loginTimeKey = "loginTime";
const isLoggedInKey = "isLoggedIn";

function login() {
  let user = document.getElementById('username').value;
  let pass = document.getElementById('password').value;

  if(user === "zarsoe" && pass === "Z05SO009W2") {
    generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
    otpExpiryTime = Date.now() + 30000;

    document.getElementById('otpDisplay').innerText = "OTP Code: " + generatedOTP;
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('otpSection').style.display = 'block';
    document.getElementById('title').innerText = "Enter OTP";
    startTimer();
  } else {
    document.getElementById('error').innerText = "Wrong username or password";
  }
}

function moveNext(el, index) {
  let inputs = document.querySelectorAll('.otp-inputs input');
  if(el.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
}

function handleBack(e, index) {
  let inputs = document.querySelectorAll('.otp-inputs input');
  if(e.key === "Backspace" && inputs[index].value === "" && index > 0) inputs[index - 1].focus();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    let remaining = Math.floor((otpExpiryTime - Date.now()) / 1000);
    if(remaining <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timer').innerText = "OTP Expired";
      generatedOTP = "";
    } else {
      document.getElementById('timer').innerText = "Expires in: " + remaining + " sec";
    }
  }, 1000);
}

function startAutoLogout() {
  localStorage.setItem(loginTimeKey, Date.now());
  localStorage.setItem(isLoggedInKey, "true");
  checkLogout();
}

function checkLogout() {
  let savedTime = localStorage.getItem(loginTimeKey);
  if(!savedTime) return;

  let elapsed = Date.now() - parseInt(savedTime);
  let remaining = 900000 - elapsed; // 15 min

  if(remaining <= 0) {
    logout();
  } else {
    logoutTimer = setTimeout(logout, remaining);
  }
}

function logout() {
  localStorage.removeItem(loginTimeKey);
  localStorage.removeItem(isLoggedInKey);
  alert("Session expired. Please login again.");
  location.reload();
}

function verifyOTP() {
  let inputs = document.querySelectorAll('.otp-inputs input');
  let entered = "";
  inputs.forEach(i => entered += i.value);

  if(Date.now() > otpExpiryTime) {
    document.getElementById('error').innerText = "OTP expired";
    return;
  }

  if(entered === generatedOTP) {
    showMainUI();
    startAutoLogout();
  } else {
    document.getElementById('error').innerText = "Invalid OTP";
  }
}

function showMainUI() {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('mainHeader').style.display = 'block';
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('body').classList.add('main-body');
}

// 🔥 IMPORTANT: handle reload
window.onload = function() {
  let isLoggedIn = localStorage.getItem(isLoggedInKey);
  let savedTime = localStorage.getItem(loginTimeKey);

  if(isLoggedIn && savedTime) {
    let elapsed = Date.now() - parseInt(savedTime);

    if(elapsed < 900000) {
      showMainUI();
      checkLogout();
    } else {
      logout();
    }
  }
}
</script>

</body>
</html>
