<html lang="my">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Township Search</title>

<style>
:root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #111;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
}

body {
    margin: 0;
    font-family: system-ui;
    background: var(--bg);
    color: var(--text);
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    padding: 12px;
}

.menu-btn {
    background: #0ea5e9;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 10px;
}

/* Container */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 16px;
}

.title {
    text-align: center;
    margin-bottom: 16px;
}

/* ✅ SEARCH FIXED */
.search-box {
    margin-bottom: 16px;
}

.search-box input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #ccc;
    background: var(--card);
    color: var(--text);
    box-sizing: border-box;
}

/* focus effect */
.search-box input:focus {
    outline: none;
    border-color: #0ea5e9;
    box-shadow: 0 0 0 2px rgba(14,165,233,0.3);
}

/* Table */
.table {
    width: 100%;
    background: var(--card);
    border-radius: 12px;
}

.table th, .table td {
    padding: 12px;
    text-align: center;
}

.table th {
    background: #4e5e74;
    color: white;
}

/* Cards */
.cards { display: none; }

.card {
    background: var(--card);
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 12px;
    text-align: center;
}

/* Menu */
.menu a {
    color: rgb(255, 0, 136);
    text-decoration: none;
}

body.dark .menu a {
    color: white;
}

/* Responsive */
@media(max-width:768px) {
    .table { display: none; }
    .cards { display: block; }
}

/* Menu UI */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

.menu {
    position: fixed;
    top: 0;
    left: -100%;
    width: 260px;
    height: 100%;
    background: var(--card);
    padding: 15px;
    transition: 0.3s;
}

.menu.active { left: 0; }

.menu-card {
    display: block;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 12px;
    background: var(--bg);
}

/* Toggle */
.switch {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.footer {
    margin-top: 20px;
    padding: 12px;
    text-align: center;
    background: var(--card);
    color: var(--text);
    border-top: 1px solid #ccc;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="menu" id="menu">
    <h3>Menu</h3>

    <div class="menu-card switch">

    </div>

    <a href="#" class="menu-card">🏠 Home</a>

    <a href="about.html" class="menu-card">ℹ️ About</a>
</div>

<div class="container">

/* Convert */
function mmToEnNumber(str) {
    const map = {"၀":"0","၁":"1","၂":"2","၃":"3","၄":"4","၅":"5","၆":"6","၇":"7","၈":"8","၉":"9"};
    return str.replace(/[၀-၉]/g, m => map[m]);
}
function enToMmNumber(str) {
    const map = {"0":"၀","1":"၁","2":"၂","3":"၃","4":"၄","5":"၅","6":"၆","7":"၇","8":"၈","9":"၉"};
    return str.replace(/[0-9]/g, m => map[m]);
}

/* Clean */
const cleanData = data.map(i => ({
    town: i.town.trim(),
    code: i.code.trim(),
    city: mmToEnNumber(String(i.city).trim()),
    region: i.region.trim()
}));

/* Render */
function render(list) {
    let t="", c="";
    list.forEach(i=>{
        t+=`<tr>
        <td>${enToMmNumber(i.city)}</td>
        <td>${i.code}</td>
        <td>${i.town}</td>
        <td>${i.region}</td>
        </tr>`;

        c+=`<div class="card">
        <b>${i.town}</b>
        <div>${i.code}</div>
        <div>${enToMmNumber(i.city)}</div>
        <div>${i.region}</div>
        </div>`;
    });

    tableBody.innerHTML=t;
    cardList.innerHTML=c;
}

/* 🔍 SEARCH (debounce + enter key) */
let timer;
search.addEventListener("keyup", function(e){
    clearTimeout(timer);
    timer=setTimeout(()=>{
        let v = mmToEnNumber(search.value).toLowerCase().trim();

        let f = cleanData.filter(i =>
            i.town.toLowerCase().includes(v) ||
            i.code.toLowerCase().includes(v) ||
            i.city.includes(v) ||
            i.region.toLowerCase().includes(v)
        );

        render(f);
        noResult.style.display = f.length ? "none":"block";
    },200);

    if(e.key==="Enter"){
        search.blur();
    }
});

/* Menu */
function toggleMenu(){
    menu.classList.add("active");
    overlay.style.display="block";
}
function closeMenu(){
    menu.classList.remove("active");
    overlay.style.display="none";
}

/* Dark Mode */
function toggleDarkMode(){
    if(darkToggle.checked){
        document.body.classList.add("dark");
        localStorage.setItem("darkMode","on");
    }else{
        document.body.classList.remove("dark");
        localStorage.setItem("darkMode","off");
    }
}

function loadDarkMode(){
    if(localStorage.getItem("darkMode")==="on"){
        document.body.classList.add("dark");
        darkToggle.checked=true;
    }
}

loadDarkMode();
render(cleanData);
