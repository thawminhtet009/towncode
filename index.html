<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Township Search</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Myanmar:wght@400;500;600;700&display=swap');

:root {
    --bg: #f5f1e9;
    --panel: rgba(255, 255, 255, 0.88);
    --surface: #fbf8f2;
    --surface-strong: #ffffff;
    --text: #24322c;
    --muted: #69766f;
    --line: #d7dfd6;
    --accent: #35584a;
    --accent-soft: #e6efe8;
    --accent-strong: #29473b;
    --danger: #c85c60;
    --shadow: 0 18px 42px rgba(36, 50, 44, 0.08);
}

body.dark {
    --bg: #131815;
    --panel: rgba(25, 32, 28, 0.9);
    --surface: #1a221e;
    --surface-strong: #202923;
    --text: #edf3ef;
    --muted: #9aa9a0;
    --line: #2d3933;
    --accent: #8db8a1;
    --accent-soft: #233129;
    --accent-strong: #cbe3d4;
    --danger: #ff9b9f;
    --shadow: 0 22px 52px rgba(0, 0, 0, 0.28);
}

* {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Plus Jakarta Sans", "Noto Sans Myanmar", system-ui, sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, rgba(53, 88, 74, 0.12), transparent 32%),
        radial-gradient(circle at top right, rgba(181, 146, 99, 0.12), transparent 24%),
        linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
}

body.dark {
    background:
        radial-gradient(circle at top left, rgba(141, 184, 161, 0.1), transparent 32%),
        radial-gradient(circle at top right, rgba(92, 118, 104, 0.1), transparent 24%),
        linear-gradient(180deg, #161d18 0%, var(--bg) 100%);
}

button,
input {
    font: inherit;
}

a {
    color: inherit;
    text-decoration: none;
}

.page-shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 18px 34px;
}

.header,
.intro-card,
.search-panel,
.results-panel,
.menu {
    border: 1px solid var(--line);
    border-radius: 26px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
}

.header {
    position: sticky;
    top: 16px;
    z-index: 10;
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
    padding: 14px 16px;
}

.menu-btn,
.lang-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 46px;
    border: 1px solid var(--line);
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
}

.menu-btn {
    position: relative;
    width: 46px;
    font-size: 0;
    color: transparent;
    background: var(--surface-strong);
}

.menu-btn::before {
    content: "\2630";
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: 18px;
    color: var(--text);
}

.lang-btn {
    min-width: 62px;
    padding: 0 16px;
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 10px 22px rgba(53, 88, 74, 0.22);
}

body.dark .lang-btn {
    color: #132019;
    box-shadow: none;
}

.menu-btn:hover,
.lang-btn:hover,
.menu-card:hover {
    transform: translateY(-1px);
}

.brand {
    min-width: 0;
}

.brand-label {
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
}

.header-title {
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
}

.container {
    display: grid;
    gap: 18px;
}

.intro-card {
    display: grid;
    grid-template-columns: minmax(0, 1.5fr) minmax(240px, 0.95fr);
    gap: 18px;
    padding: 28px;
}

.eyebrow {
    margin: 0 0 12px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
}

.intro-card h1 {
    margin: 0 0 12px;
    font-size: clamp(2rem, 4.6vw, 3rem);
    line-height: 1.06;
    letter-spacing: -0.04em;
}

.intro-card p {
    margin: 0;
    max-width: 40rem;
    color: var(--muted);
    line-height: 1.7;
}

.intro-meta {
    display: grid;
    gap: 12px;
}

.meta-pill {
    padding: 18px 18px 16px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--surface);
}

.meta-pill span {
    display: block;
    margin-bottom: 8px;
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
}

.meta-pill strong {
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--accent);
}

.search-panel,
.results-panel {
    padding: 20px;
}

.search-label {
    display: block;
    margin-bottom: 10px;
    font-size: 0.92rem;
    font-weight: 700;
}

.search-box {
    padding: 0 16px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: var(--surface);
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
}

.search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(53, 88, 74, 0.12);
    background: var(--surface-strong);
}

.search-box input {
    width: 100%;
    padding: 16px 0;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 0.96rem;
    font-weight: 600;
}

.search-box input::placeholder {
    color: var(--muted);
    font-weight: 500;
}

.search-box input:focus {
    outline: none;
}

.search-hint {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.6;
}

.section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
}

.section-head h2 {
    margin: 0 0 4px;
    font-size: 1.08rem;
}

.section-head p {
    margin: 0;
    color: var(--muted);
}

.result-badge {
    flex-shrink: 0;
    padding: 8px 12px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-strong);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.table-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--surface);
}

.table {
    width: 100%;
    min-width: 720px;
    border-collapse: separate;
    border-spacing: 0;
    background: transparent;
}

.table th,
.table td {
    padding: 15px 16px;
    text-align: left;
}

.table th {
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(53, 88, 74, 0.07);
}

.table td {
    font-size: 0.95rem;
    font-weight: 500;
    border-top: 1px solid var(--line);
}

.table tbody tr:first-child td {
    border-top: none;
}

.table tbody tr:hover {
    background: rgba(53, 88, 74, 0.05);
}

.cards {
    display: none;
    gap: 12px;
    margin-top: 14px;
}

.card {
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--surface);
}

.card-title {
    margin-bottom: 14px;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent);
}

.card-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
}

.card-row {
    padding: 12px;
    border-radius: 16px;
    background: var(--accent-soft);
}

.card-row span {
    display: block;
    margin-bottom: 5px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
}

.card-row strong {
    display: block;
    font-size: 0.95rem;
    line-height: 1.5;
}

.overlay {
    position: fixed;
    inset: 0;
    display: block;
    opacity: 0;
    pointer-events: none;
    background: rgba(19, 24, 21, 0.36);
    transition: opacity 0.24s ease;
    z-index: 20;
}

.overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.menu {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 25;
    width: 290px;
    max-width: calc(100% - 36px);
    padding: 22px;
    transform: translateX(calc(-100% - 26px));
    transition: transform 0.25s ease;
}

.menu.active {
    transform: translateX(0);
}

.menu h3 {
    margin: 0 0 16px;
    font-size: 1rem;
}

.menu-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 10px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--surface);
    color: var(--text);
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
}

.menu-card:last-child {
    margin-bottom: 0;
}

.menu-card:hover {
    border-color: var(--accent);
}

.menu-card input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
}

.no-result {
    display: none;
    margin-top: 14px;
    padding: 14px 16px;
    border: 1px dashed rgba(200, 92, 96, 0.35);
    border-radius: 18px;
    background: rgba(200, 92, 96, 0.08);
    color: var(--danger);
    text-align: center;
    font-weight: 700;
}

.footer {
    padding: 8px 8px 0;
    text-align: center;
    color: var(--muted);
    font-weight: 600;
    line-height: 1.7;
}

.footer strong {
    color: var(--text);
}

@media (max-width: 900px) {
    .intro-card {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 768px) {
    .page-shell {
        padding: 18px 14px 28px;
    }

    .header {
        position: static;
    }

    .table-wrap {
        display: none;
    }

    .cards {
        display: grid;
    }

    .section-head {
        align-items: start;
    }
}

@media (max-width: 520px) {
    .page-shell {
        padding: 14px 12px 22px;
    }

    .header,
    .intro-card,
    .search-panel,
    .results-panel,
    .menu {
        border-radius: 22px;
    }

    .header {
        gap: 12px;
        padding: 12px 14px;
    }

    .brand-label {
        font-size: 10px;
    }

    .header-title {
        font-size: 1rem;
    }

    .intro-card {
        padding: 22px;
    }

    .result-badge {
        display: none;
    }

    .card-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

/* RENDER */
function render(list){
    let t = "";
    let c = "";

    list.forEach(item => {
        let d = isMM ? item.mm : item.en;
        let city = formatValue(d.city);
        let code = formatValue(d.code);
        let town = formatValue(d.town);
        let region = formatValue(d.region);

        t += `<tr>
        <td>${city}</td>
        <td>${code}</td>
        <td>${town}</td>
        <td>${region}</td>
        </tr>`;

        c += `<article class="card">
        <div class="card-title">${town}</div>
        <div class="card-grid">
            <div class="card-row">
                <span>Code</span>
                <strong>${code}</strong>
            </div>
            <div class="card-row">
                <span>City</span>
                <strong>${city}</strong>
            </div>
            <div class="card-row">
                <span>Town</span>
                <strong>${town}</strong>
            </div>
            <div class="card-row">
                <span>Region</span>
                <strong>${region}</strong>
            </div>
        </div>
        </article>`;
    });

    tableBody.innerHTML = t;
    cardList.innerHTML = c;
    updateSummary(list);
}

function formatValue(value) {
    return value && String(value).trim() ? value : "-";
}

function getFilteredData() {
    let value = search.value.trim().toLowerCase();

    if (!value) {
        return data;
    }

    return data.filter(item => {
        let current = isMM ? item.mm : item.en;
        return Object.values(current).some(field => String(field).toLowerCase().includes(value));
    });
}

function updateSummary(list) {
    if (recordCount) {
        recordCount.textContent = list.length;
    }

    if (langStatus) {
        langStatus.textContent = isMM ? "Myanmar" : "English";
    }

    if (resultMeta) {
        resultMeta.textContent = list.length === data.length
            ? "Showing all township records"
            : `Showing ${list.length} matching record${list.length === 1 ? "" : "s"}`;
    }
}

function applySearch() {
    let filtered = getFilteredData();
    render(filtered);
    noResult.textContent = "No matching township found.";
    noResult.style.display = filtered.length ? "none" : "block";
}

/* SEARCH */
search.addEventListener("input", applySearch);

/* LANG */
function toggleLang(){
    isMM = !isMM;
    langButton.innerText = isMM ? "MM" : "EN";
    applySearch();
}

/* MENU */
function toggleMenu(){
    menu.classList.add("active");
    overlay.classList.add("active");
}

function closeMenu(){
    menu.classList.remove("active");
    overlay.classList.remove("active");
}

document.addEventListener("keydown", event => {
    if (event.key === "Escape") {
        closeMenu();
    }
});

/* DARK MODE */
function toggleDarkMode(){
    if(darkToggle.checked){
        document.body.classList.add("dark");
        localStorage.setItem("dark","on");
    }else{
        document.body.classList.remove("dark");
        localStorage.setItem("dark","off");
    }
}
function loadDark(){
    if(localStorage.getItem("dark")==="on"){
        document.body.classList.add("dark");
        darkToggle.checked = true;
    }
}

loadDark();
applySearch();

// Disable Right Click
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
}, false);

// Disable Ctrl+U, Ctrl+Shift+I, F12
document.addEventListener("keydown", function(e) {
    // Ctrl + U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
    }

    // Ctrl + Shift + I (DevTools)
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
    }

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }
});
